name: Hourly PokePop update

on:
  schedule:
    # Every hour (GitHub may delay a few minutes)
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-live:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Refresh live snapshot (BRG + optional eBay)
        env:
          EBAY_CLIENT_ID: ${{ secrets.EBAY_CLIENT_ID }}
          EBAY_CLIENT_SECRET: ${{ secrets.EBAY_CLIENT_SECRET }}
          EBAY_FETCH_LIMIT: "50"
        run: python pokemon-pop/scripts/fetch_live.py

      - name: Commit and push if changed
        run: |
          git add pokemon-pop/data/live/pop-price.json pokemon-pop/data/live/last-run.json pokemon-pop/data/data.js
          if git diff --staged --quiet; then
            echo "No live data changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore(pokepop): hourly live snapshot $(date -u +%Y-%m-%dT%H:%MZ)"
          git push
