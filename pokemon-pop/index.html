<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PokePop</title>
  <meta name="description" content="포켓몬카드팩을 골라 그레이딩 POP과 가격을 한번에 확인 할 수 있어요.">
  <meta property="og:type" content="website">
  <meta property="og:title" content="PokePop">
  <meta property="og:description" content="포켓몬카드팩을 골라 그레이딩 POP과 가격을 한번에 확인 할 수 있어요.">
  <meta property="og:image" content="https://nyong-1104.github.io/pokemon-pop/assets/og-image.png">
  <meta property="og:image:width" content="1024">
  <meta property="og:image:height" content="537">
  <meta property="og:url" content="https://nyong-1104.github.io/pokemon-pop/">
  <meta property="og:site_name" content="PokePop">
  <meta property="og:locale" content="ko_KR">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="PokePop">
  <meta name="twitter:description" content="포켓몬카드팩을 골라 그레이딩 POP과 가격을 한번에 확인 할 수 있어요.">
  <meta name="twitter:image" content="https://nyong-1104.github.io/pokemon-pop/assets/og-image.png">
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link rel="stylesheet" href="./css/pop.css">
  <link rel="stylesheet" href="./css/holo.css">
</head>
<body>
  <nav class="site-nav">
    <a class="nav-brand" href="./index.html">
      <img class="nav-brand__logo" src="./assets/pokepop-logo.png" alt="PokePop">
      <span class="nav-brand__text">PokePop</span>
    </a>
    <div class="nav-search" id="nav-search">
      <label class="nav-search__label" for="pokemon-search">
        <span class="nav-brand__text">Search</span>
      </label>
      <input
        id="pokemon-search"
        class="nav-search__input"
        type="search"
        autocomplete="off"
        spellcheck="false"
        placeholder="포켓몬 이름 검색"
      >
    </div>
    <div class="nav-actions"></div>
  </nav>

  <main class="page">
    <header class="hero-block">
      <img class="hero-logo" src="./assets/pokepop-logo.png" alt="PokePop">
      <h1>PokePop</h1>
      <p>포켓몬카드팩을 골라 그레이딩 POP과 가격을 한번에 확인 할 수 있어요.</p>
    </header>

    <section class="search-panel" id="search-panel" hidden>
      <header class="search-panel__head">
        <h2 class="search-panel__title" id="search-panel-title"></h2>
        <button type="button" class="search-panel__clear" id="search-clear"></button>
      </header>
      <div class="card-grid" id="search-grid"></div>
    </section>

    <section class="packs-section" id="packs-section">
      <header class="packs-section__head" id="packs-section-head" hidden>
        <h2 class="packs-section__title" id="packs-section-title"></h2>
      </header>
      <div class="pack-grid" id="pack-grid"></div>
    </section>

    <p class="site-updated" id="site-updated" hidden></p>

    <p class="credit">
      Holo effect adapted from
      <a href="https://github.com/simeydotme/pokemon-cards-css" target="_blank" rel="noopener">simeydotme/pokemon-cards-css</a>
      (GPL-3.0). Card images via Pokémon TCG API. POP/가격은 실시간이 아닌 테스트를 위한 MVP 스냅샷이에요.
    </p>
  </main>

  <script src="./data/data.js"></script>
  <script src="./js/shared.js"></script>
  <script src="./js/i18n.js"></script>
  <script src="./js/holo.js"></script>
  <script src="./js/packs.js"></script>
</body>
</html>
