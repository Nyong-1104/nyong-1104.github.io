<body>
  <nav class="site-nav">
    <a class="nav-brand" href="./index.html">
      <img class="nav-brand__logo" src="./assets/pokepop-logo.png" alt="PokePop">

    <div class="nav-actions">

  <main class="page">
    <div class="detail" id="detail">
      <div class="detail__visual" id="detail-visual"></div>
      <div class="detail__info">

        <div class="detail__sub" id="card-sub"></div>

        <div class="lang-tabs" id="lang-tabs" role="tablist" aria-label="언어 선택"></div>
        <p class="image-lang-note" id="image-lang-note" hidden></p>

        <div class="price-panel">
          <div class="price-panel__label">eBay Price (PSA)</div>
          <div class="price-grades" id="price-grades"></div>
          <div class="price-panel__meta" id="price-meta"></div>
          <p class="price-panel__seed" id="price-ebay-link"></p>
        <p class="price-panel__seed" id="psa-set-pop-link"></p>
        </div>

        <h2 class="section-title">POP REPORT</h2>
        <div class="pop-table-wrap">
          <table class="pop-table" id="pop-table">
            <thead><tr></tr></thead>
            <tbody></tbody>
          </table>
        </div>
        <p class="footnote" id="updated"></p>
        <p class="footnote">
          PSA · BGS · CGC · BRG · TAG · ACE · AGS. 값이 비어 있으면 아직 스냅샷에 없는 업체입니다.
        </p>
      </div>
    </div>
