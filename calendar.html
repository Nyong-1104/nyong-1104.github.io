<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>클릭 달력</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #fff; display: flex; justify-content: center; padding: 24px 16px; min-height: 100vh; transition: background 0.25s; }
    .cal-outer { width: 100%; max-width: 700px; }
    :root {
      --bg: #f9f9f9; --bg-border: #e0e0e0;
      --bg-weekend: #e8e8e8; --bg-weekend-border: #d0d0d0;
      --bg-possible: #c8e6c9; --bg-possible-border: #a5d6a7;
      --bg-impossible: #ffcdd2; --bg-impossible-border: #ef9a9a;
      --num-default: #555; --num-possible: #2e7d32; --num-impossible: #c62828;
      --num-sun: #c0392b; --num-sat: #2471a3; --num-red: #c0392b;
      --today-border: #888; --label-color: #777; --title-color: #222;
      --nav-border: #ddd; --nav-color: #333; --nav-hover-bg: #efefef;
      --footer-color: #888; --rw-border: #ddd; --rw-bg: #f0f0f0; --rw-cell-border: #bbb;
      --gap-handle-bg: rgba(120,120,120,0.25); --gap-handle-border: rgba(120,120,120,0.4);
      --gap-handle-color: #999; --corner-stroke: #bbb; --legend-reddot: #c0392b;
    }
    .dark {
      --bg: #2a2a2a; --bg-border: #3a3a3a;
      --bg-weekend: #1e1e1e; --bg-weekend-border: #141414;
      --bg-possible: #1b4a1e; --bg-possible-border: #2e7d32;
      --bg-impossible: #4a1a1a; --bg-impossible-border: #c62828;
      --num-default: #ccc; --num-possible: #81c784; --num-impossible: #e57373;
      --num-sun: #e57373; --num-sat: #64b5f6; --num-red: #e57373;
      --today-border: #aaa; --label-color: #999; --title-color: #eee;
      --nav-border: #444; --nav-color: #ccc; --nav-hover-bg: #333;
      --footer-color: #666; --rw-border: #444; --rw-bg: #222; --rw-cell-border: #555;
      --gap-handle-bg: rgba(180,180,180,0.18); --gap-handle-border: rgba(180,180,180,0.3);
      --gap-handle-color: #666; --corner-stroke: #555; --legend-reddot: #e57373;
    }
    .cal-outer { padding: 1rem 0; font-family: 'Inter', system-ui, -apple-system, sans-serif; }
    .cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
    .cal-title { font-size: 18px; font-weight: 500; color: var(--title-color); transition: color 0.25s; }
    .cal-nav button { background: none; border: 0.5px solid var(--nav-border); border-radius: 6px; padding: 6px 14px; cursor: pointer; font-size: 14px; color: var(--nav-color); transition: background 0.2s, border-color 0.25s, color 0.25s; }
    .cal-nav button:hover { background: var(--nav-hover-bg); }
    #cal-grid-wrap { display: flex; justify-content: center; }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); }
    .day-label { text-align: center; font-weight: 500; color: var(--label-color); transition: color 0.25s; }
    .day-label.sun { color: var(--num-sun); } .day-label.sat { color: var(--num-sat); }
    .day-cell { display: flex; align-items: center; justify-content: center; border-radius: 6px; cursor: pointer; user-select: none; border: 0.5px solid transparent; position: relative; transition: background 0.2s, border-color 0.2s; }
    .day-cell:hover { opacity: 0.8; } .day-cell:active { transform: scale(0.95); }
    .day-cell.empty { cursor: default; pointer-events: none; }
    .day-cell[data-state="0"] { background: var(--bg); border-color: var(--bg-border); }
    .day-cell.sun[data-state="0"], .day-cell.sat[data-state="0"] { background: var(--bg-weekend); border-color: var(--bg-weekend-border); }
    .day-cell[data-state="1"] { background: var(--bg-possible); border-color: var(--bg-possible-border); }
    .day-cell[data-state="2"] { background: var(--bg-impossible); border-color: var(--bg-impossible-border); }
    .day-cell .num { pointer-events: none; font-size: inherit; color: var(--num-default); transition: color 0.25s; }
    .day-cell[data-state="1"] .num { color: var(--num-possible); }
    .day-cell[data-state="2"] .num { color: var(--num-impossible); }
    .day-cell.sun .num { color: var(--num-sun); } .day-cell.sat .num { color: var(--num-sat); }
    .day-cell.red-num .num { color: var(--num-red) !important; font-weight: 500; }
    .day-cell.today[data-state="0"] { border: 1.5px solid var(--today-border); }
    .footer { display: flex; align-items: center; justify-content: space-between; margin-top: 14px; gap: 8px; }
    .footer-left { display: flex; gap: 14px; align-items: center; flex-wrap: wrap; }
    .legend-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--footer-color); transition: color 0.25s; }
    .legend-dot { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }
    .legend-reddot { width: 7px; height: 7px; border-radius: 50%; background: var(--legend-reddot); flex-shrink: 0; transition: background 0.25s; }
    #custom-toggle { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; color: var(--footer-color); cursor: pointer; background: none; border: none; padding: 0; transition: color 0.2s; line-height: 1.2; }
    #custom-toggle:hover { color: var(--title-color); }
    #custom-toggle .toggle-icon-wrap rect { transition: fill 0.2s; }
    #custom-toggle.open .toggle-icon-wrap rect:nth-child(1) { fill: var(--bg-possible); }
    #custom-toggle.open .toggle-icon-wrap rect:nth-child(4) { fill: var(--bg-impossible); }
    #theme-btn { display: inline-flex; align-items: center; justify-content: center; cursor: pointer; background: none; border: none; padding: 0; line-height: 1.2; font-size: 12px; color: var(--footer-color); transition: color 0.2s; }
    #theme-btn:hover { color: var(--title-color); }
    #reset-btn { display: inline-flex; align-items: center; gap: 4px; font-size: 12px; color: var(--footer-color); cursor: pointer; background: none; border: none; padding: 0; white-space: nowrap; transition: color 0.2s; line-height: 1.2; }
    #reset-btn:hover { color: var(--title-color); }
    #rw-panel { overflow: hidden; max-height: 0; opacity: 0; transition: max-height 0.3s ease, opacity 0.25s ease, margin-top 0.25s ease; margin-top: 0; }
    #rw-panel.open { max-height: 300px; opacity: 1; margin-top: 8px; }
    #rw-outer { position: relative; flex-shrink: 0; border: 0.5px solid var(--rw-border); border-radius: 6px; background: var(--rw-bg); box-sizing: border-box; user-select: none; display: inline-block; transition: background 0.25s, border-color 0.25s; }
    #rw-inner { position: absolute; display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; box-sizing: border-box; }
    .sc { border-radius: 2px; border: 0.5px solid var(--rw-cell-border); box-sizing: border-box; transition: background 0.25s, border-color 0.25s; }
    .dh { position: absolute; background: transparent; z-index: 10; }
    #dh-outer { bottom: 0; right: 0; width: 14px; height: 14px; cursor: nwse-resize; }
    #dh-outer-w { top: 0; right: 0; width: 8px; cursor: ew-resize; }
    #dh-outer-h { bottom: 0; left: 0; height: 8px; cursor: ns-resize; }
    #dh-gap { cursor: move; border-radius: 50%; background: var(--gap-handle-bg); border: 0.5px solid var(--gap-handle-border); display: flex; align-items: center; justify-content: center; font-size: 8px; color: var(--gap-handle-color); }
    .corner-arrow { position: absolute; bottom: 3px; right: 3px; pointer-events: none; }
  </style>
</head>
<body>
<div class="cal-outer" id="cal-outer">
  <div class="cal-header">
    <div class="cal-nav"><button id="prev">&#8592;</button></div>
    <div class="cal-title" id="cal-title"></div>
    <div class="cal-nav"><button id="next">&#8594;</button></div>
  </div>
  <div id="cal-grid-wrap">
    <div class="cal-grid" id="cal-grid"></div>
  </div>
  <div class="footer">
    <div class="footer-left">
      <div class="legend-item"><div class="legend-dot" id="ld-basic"></div>기본</div>
      <div class="legend-item"><div class="legend-dot" id="ld-possible"></div>가능</div>
      <div class="legend-item"><div class="legend-dot" id="ld-impossible"></div>불가능</div>
      <div class="legend-item"><div class="legend-reddot"></div>우클릭</div>
      <button id="custom-toggle">
        <svg class="toggle-icon-wrap" width="12" height="12" viewBox="0 0 12 12">
          <rect x="0.5" y="0.5" width="4.5" height="4.5" rx="1" fill="#e8e8e8" stroke="#bbb" stroke-width="0.6"/>
          <rect x="7"   y="0.5" width="4.5" height="4.5" rx="1" fill="#e8e8e8" stroke="#bbb" stroke-width="0.6"/>
          <rect x="0.5" y="7"   width="4.5" height="4.5" rx="1" fill="#e8e8e8" stroke="#bbb" stroke-width="0.6"/>
          <rect x="7"   y="7"   width="4.5" height="4.5" rx="1" fill="#e8e8e8" stroke="#bbb" stroke-width="0.6"/>
        </svg>
        커스텀박스
      </button>
      <button id="theme-btn" title="테마 전환">
        <svg id="theme-icon" width="12" height="12" viewBox="0 0 12 12" fill="none"></svg>
      </button>
    </div>
    <button id="reset-btn">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
        <path d="M10 6a4 4 0 1 1-1.17-2.83" stroke="currentColor" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round"/>
        <polyline points="8.2,2.2 9,3.4 10.3,2.7" stroke="currentColor" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      초기화
    </button>
  </div>
  <div id="rw-panel">
    <div id="rw-outer">
      <div id="rw-inner">
        <div class="sc" id="sc1"></div>
        <div class="sc" id="sc2"></div>
        <div class="sc" id="sc3"></div>
        <div class="sc" id="sc4"></div>
      </div>
      <div class="dh" id="dh-gap">+</div>
      <div class="dh" id="dh-outer-w"></div>
      <div class="dh" id="dh-outer-h"></div>
      <div class="dh" id="dh-outer"></div>
      <svg class="corner-arrow" width="10" height="10" viewBox="0 0 10 10">
        <line x1="2" y1="9" x2="9" y2="2" stroke="var(--corner-stroke)" stroke-width="1.2" stroke-linecap="round"/>
        <line x1="5.5" y1="9" x2="9" y2="5.5" stroke="var(--corner-stroke)" stroke-width="1.2" stroke-linecap="round"/>
      </svg>
    </div>
  </div>
</div>

<script>
  // ── localStorage helpers ─────────────────────────────────
  const LS = {
    get(k, def) { try { const v = localStorage.getItem(k); return v !== null ? JSON.parse(v) : def; } catch(e) { return def; } },
    set(k, v)   { try { localStorage.setItem(k, JSON.stringify(v)); } catch(e) {} }
  };

  // ── State — load persisted values ───────────────────────
  const colorStates = LS.get('cal_colors', {});
  const redMarks    = LS.get('cal_reds',   {});
  let isDark = LS.get('cal_dark',  false);
  let cellW  = LS.get('cal_cellW', null);   // null = 첫 실행 → 컨테이너 꽉 채움
  let cellH  = LS.get('cal_cellH', 40);
  let gap    = LS.get('cal_gap',   4);

  const now = new Date();
  let year = now.getFullYear(), month = now.getMonth();
  const PAD=6, CELL_H_MIN=18, CELL_H_MAX=90, GAP_MIN=1, GAP_MAX=14;

  const themes = {
    light:{bg:'#f9f9f9',bgB:'#e0e0e0',bgWe:'#e8e8e8',bgWeB:'#d0d0d0',bgPos:'#c8e6c9',bgPosB:'#a5d6a7',bgImp:'#ffcdd2',bgImpB:'#ef9a9a'},
    dark: {bg:'#2a2a2a',bgB:'#3a3a3a',bgWe:'#1e1e1e',bgWeB:'#141414',bgPos:'#1b4a1e',bgPosB:'#2e7d32',bgImp:'#4a1a1a',bgImpB:'#c62828'}
  };

  function save() {
    LS.set('cal_colors', colorStates);
    LS.set('cal_reds',   redMarks);
    LS.set('cal_dark',   isDark);
    LS.set('cal_cellW',  cellW);
    LS.set('cal_cellH',  cellH);
    LS.set('cal_gap',    gap);
  }

  function key(y,m,d) { return `${y}-${m}-${d}`; }

  function syncThemeBtnHeight() {
    const h = document.getElementById('custom-toggle').getBoundingClientRect().height;
    if (h > 0) document.getElementById('theme-btn').style.height = h + 'px';
  }

  function updateThemeIcon() {
    const icon = document.getElementById('theme-icon');
    icon.innerHTML = isDark
      ? `<circle cx="6" cy="6" r="3" fill="currentColor"/><circle cx="6" cy="6" r="5" stroke="currentColor" stroke-width="1" fill="none"/>`
      : `<circle cx="6" cy="6" r="5" stroke="currentColor" stroke-width="1" fill="none"/><path d="M6 1a5 5 0 0 1 0 10z" fill="currentColor"/>`;
  }

  function applyTheme() {
    document.getElementById('cal-outer').classList.toggle('dark', isDark);
    document.body.style.background = isDark ? '#111' : '#fff';
    const t = isDark ? themes.dark : themes.light;
    document.getElementById('ld-basic').style.cssText      = `background:${t.bg};border:0.5px solid ${t.bgB};width:12px;height:12px;border-radius:3px;flex-shrink:0;`;
    document.getElementById('ld-possible').style.cssText   = `background:${t.bgPos};border:0.5px solid ${t.bgPosB};width:12px;height:12px;border-radius:3px;flex-shrink:0;`;
    document.getElementById('ld-impossible').style.cssText = `background:${t.bgImp};border:0.5px solid ${t.bgImpB};width:12px;height:12px;border-radius:3px;flex-shrink:0;`;
    document.getElementById('sc1').style.background = t.bgPos;
    document.getElementById('sc2').style.background = t.bg;
    document.getElementById('sc3').style.background = t.bg;
    document.getElementById('sc4').style.background = t.bgImp;
    updateThemeIcon(); syncThemeBtnHeight();
  }

  function getContainerWidth() { return document.getElementById('cal-grid-wrap').clientWidth; }
  function maxCellW()      { return Math.floor((getContainerWidth() - gap * 6) / 7); }
  function calGridWidth()  { return cellW * 7 + gap * 6; }
  function outerW()        { return cellW * 2 + gap + PAD * 2; }
  function outerH()        { return cellH * 2 + gap + PAD * 2; }
  function clampCellW()    { cellW = Math.round(Math.max(24, Math.min(maxCellW(), cellW))); }

  function syncWidget() {
    const outer=document.getElementById('rw-outer'), inner=document.getElementById('rw-inner');
    const gh=document.getElementById('dh-gap'), dhW=document.getElementById('dh-outer-w'), dhH=document.getElementById('dh-outer-h');
    const ow=outerW(), oh=outerH();
    outer.style.width=ow+'px'; outer.style.height=oh+'px';
    inner.style.left=PAD+'px'; inner.style.top=PAD+'px';
    inner.style.width=(ow-PAD*2)+'px'; inner.style.height=(oh-PAD*2)+'px'; inner.style.gap=gap+'px';
    const ghS=Math.max(8,Math.min(16,gap*2+4));
    gh.style.width=ghS+'px'; gh.style.height=ghS+'px';
    gh.style.left=(ow/2-ghS/2)+'px'; gh.style.top=(oh/2-ghS/2)+'px';
    dhW.style.top='0'; dhW.style.height=(oh-12)+'px';
    dhH.style.left='0'; dhH.style.width=(ow-12)+'px';
  }

  function syncCalGrid() {
    const fs=Math.max(9,Math.min(18,Math.round(cellH*0.36)));
    const lfs=Math.max(9,Math.min(13,Math.round(cellH*0.28)));
    const pt=Math.max(2,Math.round(gap*0.8)), pb=Math.max(3,Math.round(gap*1.2));
    const grid=document.getElementById('cal-grid');
    grid.style.width=calGridWidth()+'px'; grid.style.gridTemplateColumns=`repeat(7,${cellW}px)`; grid.style.gap=gap+'px';
    grid.querySelectorAll('.day-cell').forEach(el=>{el.style.height=cellH+'px'; el.style.fontSize=fs+'px';});
    grid.querySelectorAll('.day-label').forEach(el=>{el.style.fontSize=lfs+'px'; el.style.padding=`${pt}px 0 ${pb}px`;});
  }

  function render() {
    const grid=document.getElementById('cal-grid');
    const months=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
    document.getElementById('cal-title').textContent=`${year}년 ${months[month]}`;
    grid.innerHTML=''; clampCellW();
    grid.style.width=calGridWidth()+'px'; grid.style.gridTemplateColumns=`repeat(7,${cellW}px)`; grid.style.gap=gap+'px';
    const fs=Math.max(9,Math.min(18,Math.round(cellH*0.36)));
    const lfs=Math.max(9,Math.min(13,Math.round(cellH*0.28)));
    const pt=Math.max(2,Math.round(gap*0.8)), pb=Math.max(3,Math.round(gap*1.2));
    ['일','월','화','수','목','금','토'].forEach((d,i)=>{
      const el=document.createElement('div');
      el.className='day-label'+(i===0?' sun':i===6?' sat':'');
      el.textContent=d; el.style.fontSize=lfs+'px'; el.style.padding=`${pt}px 0 ${pb}px`;
      grid.appendChild(el);
    });
    const firstDay=new Date(year,month,1).getDay();
    const dim=new Date(year,month+1,0).getDate();
    for(let i=0;i<firstDay;i++){const el=document.createElement('div');el.className='day-cell empty';el.style.height=cellH+'px';grid.appendChild(el);}
    for(let d=1;d<=dim;d++){
      const el=document.createElement('div');
      const dow=(firstDay+d-1)%7;
      let cls='day-cell';
      if(dow===0)cls+=' sun'; if(dow===6)cls+=' sat';
      if(d===now.getDate()&&month===now.getMonth()&&year===now.getFullYear())cls+=' today';
      const k=key(year,month,d);
      if(redMarks[k])cls+=' red-num';
      el.className=cls; el.style.height=cellH+'px'; el.style.fontSize=fs+'px'; el.dataset.state=colorStates[k]||0;
      const ns=document.createElement('span'); ns.className='num'; ns.textContent=d; el.appendChild(ns);
      el.addEventListener('click',()=>{
        const n=(parseInt(el.dataset.state)+1)%3;
        colorStates[k]=n; el.dataset.state=n; save();
      });
      el.addEventListener('contextmenu',(e)=>{
        e.preventDefault();
        redMarks[k]=!redMarks[k];
        el.classList.toggle('red-num',!!redMarks[k]); save();
      });
      grid.appendChild(el);
    }
  }

  // ── Init ─────────────────────────────────────────────────
  setTimeout(()=>{
    if (cellW === null) cellW = maxCellW();
    else clampCellW();
    render(); syncWidget(); applyTheme();
  }, 50);

  document.getElementById('prev').addEventListener('click',()=>{month--;if(month<0){month=11;year--;}render();});
  document.getElementById('next').addEventListener('click',()=>{month++;if(month>11){month=0;year++;}render();});

  document.getElementById('custom-toggle').addEventListener('click',()=>{
    const btn=document.getElementById('custom-toggle'), panel=document.getElementById('rw-panel');
    const isOpen=panel.classList.contains('open');
    btn.classList.toggle('open',!isOpen); panel.classList.toggle('open',!isOpen);
  });

  document.getElementById('reset-btn').addEventListener('click',()=>{
    if(!confirm('모든 날짜 상태를 초기화할까요?')) return;
    for(const k in colorStates) delete colorStates[k];
    for(const k in redMarks)    delete redMarks[k];
    save(); render();
  });

  document.getElementById('theme-btn').addEventListener('click',()=>{
    isDark=!isDark; applyTheme(); save();
  });

  // ── Drag ─────────────────────────────────────────────────
  let dragMode=null, startX, startY, s_cW, s_cH, s_g;
  function startDrag(mode,cx,cy){dragMode=mode;startX=cx;startY=cy;s_cW=cellW;s_cH=cellH;s_g=gap;}
  function onMove(cx,cy){
    if(!dragMode)return;
    const dx=cx-startX, dy=cy-startY, minW=24, maxW=maxCellW();
    if(dragMode==='outer-both'){cellW=Math.round(Math.max(minW,Math.min(maxW,s_cW+dx*0.5)));cellH=Math.round(Math.max(CELL_H_MIN,Math.min(CELL_H_MAX,s_cH+dy*0.5)));}
    else if(dragMode==='outer-w'){cellW=Math.round(Math.max(minW,Math.min(maxW,s_cW+dx*0.5)));}
    else if(dragMode==='outer-h'){cellH=Math.round(Math.max(CELL_H_MIN,Math.min(CELL_H_MAX,s_cH+dy*0.5)));}
    else if(dragMode==='gap'){gap=Math.round(Math.max(GAP_MIN,Math.min(GAP_MAX,s_g+(dx+dy)*0.08)));clampCellW();}
    syncWidget(); syncCalGrid();
  }
  function endDrag(){ if(dragMode){ save(); } dragMode=null; }
  function attachDrag(el,mode){
    el.addEventListener('mousedown',(e)=>{startDrag(mode,e.clientX,e.clientY);e.stopPropagation();e.preventDefault();});
    el.addEventListener('touchstart',(e)=>{startDrag(mode,e.touches[0].clientX,e.touches[0].clientY);e.stopPropagation();e.preventDefault();},{passive:false});
  }
  attachDrag(document.getElementById('dh-outer'),'outer-both');
  attachDrag(document.getElementById('dh-outer-w'),'outer-w');
  attachDrag(document.getElementById('dh-outer-h'),'outer-h');
  attachDrag(document.getElementById('dh-gap'),'gap');
  document.addEventListener('mousemove',(e)=>onMove(e.clientX,e.clientY));
  document.addEventListener('touchmove',(e)=>{if(dragMode){onMove(e.touches[0].clientX,e.touches[0].clientY);e.preventDefault();}},{passive:false});
  document.addEventListener('mouseup',endDrag);
  document.addEventListener('touchend',endDrag);
  window.addEventListener('resize',()=>{clampCellW();syncWidget();syncCalGrid();});
</script>
</body>
</html>
