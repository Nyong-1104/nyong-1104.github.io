<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>nyong.app</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .wrap {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .holo-btn {
      position: relative;
      width: 280px;
      padding: 1.2rem 1.8rem;
      border-radius: 16px;
      border: none;
      cursor: pointer;
      text-decoration: none;
      display: block;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      color: #fff;
      background: #1a1a1a;
      overflow: hidden;
      transform-style: preserve-3d;
      transition: transform 0.1s ease, box-shadow 0.1s ease;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6), 0 2px 8px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.08);
      will-change: transform;
    }
    .holo-btn .shine {
      position: absolute;
      inset: 0;
      border-radius: inherit;
      opacity: 0;
      transition: opacity 0.15s;
      pointer-events: none;
      mix-blend-mode: screen;
      background: conic-gradient(from 0deg, #ff006680, #ff980080, #ffff0080, #00ff8880, #00bfff80, #8a2be280, #ff006680);
      filter: blur(2px);
    }
    .holo-btn .glare {
      position: absolute;
      inset: 0;
      border-radius: inherit;
      pointer-events: none;
      opacity: 0;
      background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.35) 0%, transparent 65%);
      transition: opacity 0.15s;
    }
    .holo-btn .label {
      position: relative;
      z-index: 2;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <a class="holo-btn" href="/heoli-stretching.html">
      <div class="shine"></div>
      <div class="glare"></div>
      <span class="label">헤올리 스트레칭</span>
    </a>
    <a class="holo-btn" href="/calendar.html">
      <div class="shine"></div>
      <div class="glare"></div>
      <span class="label">캘린더</span>
    </a>
  </div>
  <script>
    function initHolo(btn) {
      const shine = btn.querySelector('.shine');
      const glare = btn.querySelector('.glare');
      btn.addEventListener('mousemove', e => {
        const r = btn.getBoundingClientRect();
        const x = (e.clientX - r.left) / r.width;
        const y = (e.clientY - r.top) / r.height;
        const rx = (y - 0.5) * 22;
        const ry = (x - 0.5) * -22;
        btn.style.transform = `perspective(600px) rotateX(${rx}deg) rotateY(${ry}deg) scale(1.03)`;
        btn.style.boxShadow = `0 20px 50px rgba(0,0,0,0.7), 0 4px 12px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.12)`;
        const angle = (Math.atan2(y - 0.5, x - 0.5) * 180 / Math.PI + 360) % 360;
        shine.style.background = `conic-gradient(from ${angle}deg, #ff006680, #ff980080, #ffff0080, #00ff8880, #00bfff80, #8a2be280, #ff006680)`;
        shine.style.opacity = '0.6';
        glare.style.background = `radial-gradient(circle at ${x * 100}% ${y * 100}%, rgba(255,255,255,0.4) 0%, transparent 60%)`;
        glare.style.opacity = '1';
      });
      btn.addEventListener('mouseleave', () => {
        btn.style.transform = 'perspective(600px) rotateX(0deg) rotateY(0deg) scale(1)';
        btn.style.boxShadow = '0 8px 32px rgba(0,0,0,0.6), 0 2px 8px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.08)';
        shine.style.opacity = '0';
        glare.style.opacity = '0';
      });
    }
    document.querySelectorAll('.holo-btn').forEach(initHolo);
  </script>
</body>
</html>
